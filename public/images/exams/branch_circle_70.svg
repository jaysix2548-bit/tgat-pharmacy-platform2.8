<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100">
  <rect x="0" y="0" width="400" height="100" fill="#0f172a" rx="8"/>

  <!-- Step 1: Pointer at 12:00 (0 deg) -->
  <rect x="10" y="10" width="80" height="80" rx="5" fill="none" stroke="#475569" stroke-width="2"/>
  <circle cx="50" cy="50" r="20" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <line x1="50" y1="30" x2="50" y2="15" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="22" x2="56" y2="18" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="26" x2="44" y2="22" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <text x="50" y="85" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">ภาพที่ 1</text>

  <!-- Arrow -->
  <path d="M 100,50 L 110,50" stroke="#94a3b8" stroke-width="2"/>

  <!-- Step 2: Pointer at 01:30 (45 deg) -->
  <rect x="120" y="10" width="80" height="80" rx="5" fill="none" stroke="#475569" stroke-width="2"/>
  <circle cx="160" cy="50" r="20" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <!-- 45 degrees line: cos(45)=0.7, sin(45)=0.7. cx+20*0.7=174, cy-20*0.7=36. Length 15, tip at cx+35*0.7=185, cy-35*0.7=25 -->
  <line x1="174" y1="36" x2="185" y2="25" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  <!-- Sub branches -->
  <line x1="178" y1="32" x2="184" y2="33" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="181" y1="29" x2="178" y2="24" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <text x="160" y="85" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">ภาพที่ 2</text>

  <!-- Arrow -->
  <path d="M 210,50 L 220,50" stroke="#94a3b8" stroke-width="2"/>

  <!-- Step 3: Pointer at 03:00 (90 deg) -->
  <rect x="230" y="10" width="80" height="80" rx="5" fill="none" stroke="#475569" stroke-width="2"/>
  <circle cx="270" cy="50" r="20" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <line x1="290" y1="50" x2="305" y2="50" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  <line x1="298" y1="50" x2="302" y2="56" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="294" y1="50" x2="298" y2="44" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <text x="270" y="85" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">ภาพที่ 3</text>

  <!-- Arrow -->
  <path d="M 320,50 L 330,50" stroke="#94a3b8" stroke-width="2"/>

  <!-- Step 4: Question -->
  <rect x="340" y="10" width="50" height="80" rx="5" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4"/>
  <text x="365" y="55" font-family="sans-serif" font-size="32" font-weight="bold" fill="#ef4444" text-anchor="middle">?</text>
</svg>
