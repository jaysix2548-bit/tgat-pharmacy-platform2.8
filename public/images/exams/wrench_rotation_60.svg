<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="200">
  <defs>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>
  
  <rect x="0" y="0" width="200" height="200" fill="#0f172a" rx="8"/>
  
  <!-- Title / Label -->
  <text x="100" y="25" font-family="sans-serif" font-size="12" font-weight="bold" fill="#3b82f6" text-anchor="middle">ประแจรูปตัว L (ภาพต้นแบบ)</text>
  
  <!-- Compass/Coordinate reference in background -->
  <line x1="100" y1="40" x2="100" y2="170" stroke="#1e293b" stroke-width="1" stroke-dasharray="2"/>
  <line x1="50" y1="160" x2="170" y2="160" stroke="#1e293b" stroke-width="1" stroke-dasharray="2"/>
  
  <!-- Hex key path -->
  <path d="M 100 60 L 100 160 L 150 160" fill="none" stroke="url(#metalGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Inner line to give hex/metallic look -->
  <path d="M 100 62 L 100 160 L 148 160" fill="none" stroke="#f8fafc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- End Caps detail -->
  <circle cx="100" cy="60" r="7" fill="#64748b"/>
  <circle cx="150" cy="160" r="7" fill="#64748b"/>
  
  <!-- Labels for parts -->
  <text x="100" y="45" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">ปลายยาว (ชี้ขึ้น)</text>
  <text x="155" y="180" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">ปลายสั้น (ชี้ขวา)</text>
  
  <!-- Right angle marker -->
  <path d="M 100 145 L 115 145 L 115 160" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
</svg>
