<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100">
  <rect x="0" y="0" width="400" height="100" fill="#0f172a" rx="8"/>

  <!-- Step 1: Half Circle (0.5) -->
  <rect x="10" y="10" width="80" height="80" rx="5" fill="none" stroke="#475569" stroke-width="2"/>
  <!-- Top half arc of circle at cx=50, cy=55, r=20 -->
  <path d="M 30 55 A 20 20 0 0 1 70 55" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <text x="50" y="85" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">ภาพที่ 1</text>

  <!-- Arrow -->
  <path d="M 100,50 L 110,50" stroke="#94a3b8" stroke-width="2"/>

  <!-- Step 2: Full Circle (1.0) -->
  <rect x="120" y="10" width="80" height="80" rx="5" fill="none" stroke="#475569" stroke-width="2"/>
  <circle cx="160" cy="50" r="20" fill="none" stroke="#3b82f6" stroke-width="4"/>
  <text x="160" y="85" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">ภาพที่ 2</text>

  <!-- Arrow -->
  <path d="M 210,50 L 220,50" stroke="#94a3b8" stroke-width="2"/>

  <!-- Step 3: Full Circle + Half Circle (1.5) -->
  <rect x="230" y="10" width="80" height="80" rx="5" fill="none" stroke="#475569" stroke-width="2"/>
  <!-- Full circle at cx=260, cy=50, r=20 -->
  <circle cx="260" cy="50" r="20" fill="none" stroke="#3b82f6" stroke-width="4"/>
  <!-- Half circle at cx=280, cy=50, r=20, right half only -->
  <path d="M 280 30 A 20 20 0 0 1 280 70" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
  <text x="270" y="85" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">ภาพที่ 3</text>

  <!-- Arrow -->
  <path d="M 320,50 L 330,50" stroke="#94a3b8" stroke-width="2"/>

  <!-- Step 4: Question -->
  <rect x="340" y="10" width="50" height="80" rx="5" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4"/>
  <text x="365" y="55" font-family="sans-serif" font-size="32" font-weight="bold" fill="#ef4444" text-anchor="middle">?</text>
</svg>
