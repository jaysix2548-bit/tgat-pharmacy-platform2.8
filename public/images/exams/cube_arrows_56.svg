<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 200" width="100%" height="200">
  <defs>
    <!-- Gradients for realistic 3D appearance -->
    <linearGradient id="topFaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="leftFaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="rightFaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <!-- Arrow marker -->
    <marker id="redArrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="220" height="200" fill="#0f172a" rx="8"/>

  <!-- Top Face (Rhombus) -->
  <polygon points="110,40 160,65 110,90 60,65" fill="url(#topFaceGrad)" stroke="#475569" stroke-width="2"/>

  <!-- Left Face (Rhombus) -->
  <polygon points="60,65 110,90 110,170 60,145" fill="url(#leftFaceGrad)" stroke="#475569" stroke-width="2"/>

  <!-- Right Face (Rhombus) -->
  <polygon points="110,90 160,65 160,145 110,170" fill="url(#rightFaceGrad)" stroke="#475569" stroke-width="2"/>

  <!-- Highlight the shared vertical edge (สันกล่องที่รอยต่อพบกัน) -->
  <line x1="110" y1="90" x2="110" y2="170" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <text x="110" y="185" font-family="sans-serif" font-size="10" fill="#f59e0b" font-weight="bold" text-anchor="middle">สันขอบพับร่วม (Shared Edge)</text>

  <!-- Left Face Arrow: Pointing up-right towards the shared edge (110, 130) -->
  <line x1="78" y1="114" x2="100" y2="125" stroke="#ef4444" stroke-width="4" stroke-linecap="round" marker-end="url(#redArrow)"/>
  
  <!-- Right Face Arrow: Pointing up-left towards the shared edge (110, 130) -->
  <line x1="142" y1="114" x2="120" y2="125" stroke="#ef4444" stroke-width="4" stroke-linecap="round" marker-end="url(#redArrow)"/>

  <!-- Annotations -->
  <text x="50" y="110" font-family="sans-serif" font-size="8" fill="#94a3b8" text-anchor="end">หน้าแรก (↑)</text>
  <text x="170" y="110" font-family="sans-serif" font-size="8" fill="#94a3b8" text-anchor="start">หน้าที่สอง (→)</text>
</svg>
