<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="100%" height="120">
  <defs>
    <!-- Metallic gradient for the 3D-ish F-block -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="300" height="120" fill="#0f172a" rx="8"/>

  <!-- Left Side: Original F-Block -->
  <rect x="15" y="15" width="100" height="90" rx="5" fill="none" stroke="#475569" stroke-width="2"/>
  
  <!-- 3D-ish F Shape on Left (Facing Right) -->
  <path d="M 40,30 L 75,30 M 40,55 L 65,55 M 40,30 L 40,85" stroke="url(#metalGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 3D depth lines (highlight) -->
  <path d="M 40,32 L 73,32 M 40,57 L 63,57 M 42,32 L 42,83" stroke="#93c5fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <text x="65" y="100" font-family="sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">ภาพต้นแบบ (F-Block)</text>

  <!-- Middle: Reflection + Rotation Indicators -->
  <line x1="140" y1="15" x2="140" y2="105" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="140" y="112" font-family="sans-serif" font-size="8" fill="#ef4444" text-anchor="middle">แนวสะท้อน (Mirror)</text>
  
  <path d="M 155,40 Q 170,55 155,70" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <path d="M 153,65 L 155,70 L 160,67" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <text x="175" y="58" font-family="sans-serif" font-size="8" fill="#f59e0b">หมุนตามเข็ม 90°</text>

  <!-- Right Side: Question mark box -->
  <rect x="195" y="15" width="90" height="90" rx="5" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4"/>
  <text x="240" y="60" font-family="sans-serif" font-size="32" font-weight="bold" fill="#ef4444" text-anchor="middle">?</text>
  <text x="240" y="100" font-family="sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">ภาพผลลัพธ์</text>
</svg>
