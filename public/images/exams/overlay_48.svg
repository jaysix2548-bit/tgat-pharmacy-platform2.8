<svg width="320" height="130" viewBox="0 0 320 130" xmlns="http://www.w3.org/2000/svg">
  <style>
    .sheet { fill: #1e293b; stroke: #38bdf8; stroke-width: 2.5; rx: 8; }
    .line-mark { stroke: #38bdf8; stroke-width: 3.5; stroke-linecap: round; }
    .dot-mark { fill: #f43f5e; }
    .operator { fill: #eab308; font-size: 24px; font-family: system-ui, -apple-system, sans-serif; font-weight: bold; text-anchor: middle; }
    .label { fill: #94a3b8; font-size: 11px; font-family: system-ui, -apple-system, sans-serif; font-weight: bold; text-anchor: middle; }
  </style>

  <!-- Sheet 1 -->
  <g transform="translate(10, 10)">
    <rect class="sheet" width="80" height="80"/>
    <!-- Diagonal (\) from top-left (10, 10) to bottom-right (70, 70) -->
    <line class="line-mark" x1="10" y1="10" x2="70" y2="70"/>
    <!-- Dot at center bottom (40, 70) -->
    <circle class="dot-mark" cx="40" cy="70" r="8"/>
    <text x="40" y="105" class="label">แผ่นที่ 1</text>
  </g>

  <!-- Plus Sign -->
  <text x="120" y="58" class="operator">+</text>

  <!-- Sheet 2 -->
  <g transform="translate(150, 10)">
    <rect class="sheet" width="80" height="80"/>
    <!-- Vertical line (|) down the middle (40, 10) to (40, 70) -->
    <line class="line-mark" x1="40" y1="10" x2="40" y2="70"/>
    <!-- Dot at bottom-right (70, 70) -->
    <circle class="dot-mark" cx="70" cy="70" r="8"/>
    <text x="40" y="105" class="label">แผ่นที่ 2</text>
  </g>

  <!-- Equals Sign / Question -->
  <text x="260" y="58" class="operator">=</text>
  <g transform="translate(285, 30)">
    <circle cx="15" cy="15" r="15" fill="#c084fc"/>
    <text x="15" y="24" fill="#1e293b" font-size="22px" font-family="system-ui" font-weight="900" text-anchor="middle">?</text>
  </g>
</svg>
