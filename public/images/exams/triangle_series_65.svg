<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100">
  <!-- Step 1: Up triangle -->
  <rect x="10" y="10" width="80" height="80" rx="5" fill="none" stroke="#475569" stroke-width="2"/>
  <polygon points="50,25 30,65 70,65" fill="#3b82f6" />
  <text x="50" y="85" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">1</text>

  <!-- Arrow -->
  <path d="M 100,50 L 110,50" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Step 2: Right triangle -->
  <rect x="120" y="10" width="80" height="80" rx="5" fill="none" stroke="#475569" stroke-width="2"/>
  <polygon points="160,50 135,30 135,70" fill="#3b82f6" />
  <text x="160" y="85" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">2</text>

  <!-- Arrow -->
  <path d="M 210,50 L 220,50" stroke="#94a3b8" stroke-width="2"/>

  <!-- Step 3: Down triangle -->
  <rect x="230" y="10" width="80" height="80" rx="5" fill="none" stroke="#475569" stroke-width="2"/>
  <polygon points="270,75 250,35 290,35" fill="#3b82f6" />
  <text x="270" y="85" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">3</text>

  <!-- Arrow -->
  <path d="M 320,50 L 330,50" stroke="#94a3b8" stroke-width="2"/>

  <!-- Step 4: Question Mark -->
  <rect x="340" y="10" width="50" height="80" rx="5" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4"/>
  <text x="365" y="55" font-family="sans-serif" font-size="32" font-weight="bold" fill="#ef4444" text-anchor="middle">?</text>
</svg>
