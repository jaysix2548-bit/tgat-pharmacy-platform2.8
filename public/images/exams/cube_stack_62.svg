<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="100%" height="160">
  <rect x="0" y="0" width="320" height="160" fill="#0f172a" rx="8"/>

  <!-- Left Side: 3D Isometric View -->
  <g transform="translate(10, 0)">
    <rect x="5" y="10" width="150" height="140" rx="5" fill="none" stroke="#475569" stroke-width="2"/>
    <text x="80" y="25" font-family="sans-serif" font-size="10" font-weight="bold" fill="#3b82f6" text-anchor="middle">ภาพฉาย 3 มิติ (Isometric)</text>

    <!-- Painters algorithm order (back to front) -->
    
    <!-- x+y = 0: (0,0,0) cx=80, cy=90 -->
    <g>
      <polygon points="80,90 98,99 80,108 62,99" fill="#e2e8f0" stroke="#475569" stroke-width="0.5"/>
      <polygon points="62,99 80,108 80,130 62,121" fill="#94a3b8" stroke="#475569" stroke-width="0.5"/>
      <polygon points="80,108 98,99 98,121 80,130" fill="#64748b" stroke="#475569" stroke-width="0.5"/>
    </g>

    <!-- x+y = 1: (1,0,0) cx=98, cy=99 -->
    <g>
      <polygon points="98,99 116,108 98,117 80,108" fill="#e2e8f0" stroke="#475569" stroke-width="0.5"/>
      <polygon points="80,108 98,117 98,139 80,130" fill="#94a3b8" stroke="#475569" stroke-width="0.5"/>
      <polygon points="98,117 116,108 116,130 98,139" fill="#64748b" stroke="#475569" stroke-width="0.5"/>
    </g>

    <!-- x+y = 1: (0,1,0) cx=62, cy=99 -->
    <g>
      <polygon points="62,99 80,108 62,117 44,108" fill="#e2e8f0" stroke="#475569" stroke-width="0.5"/>
      <polygon points="44,108 62,117 62,139 44,130" fill="#94a3b8" stroke="#475569" stroke-width="0.5"/>
      <polygon points="62,117 80,108 80,130 62,139" fill="#64748b" stroke="#475569" stroke-width="0.5"/>
    </g>

    <!-- x+y = 2: (2,0,0) cx=116, cy=108 -->
    <g>
      <polygon points="116,108 134,117 116,126 98,117" fill="#e2e8f0" stroke="#475569" stroke-width="0.5"/>
      <polygon points="98,117 116,126 116,148 98,139" fill="#94a3b8" stroke="#475569" stroke-width="0.5"/>
      <polygon points="116,126 134,117 134,139 116,148" fill="#64748b" stroke="#475569" stroke-width="0.5"/>
    </g>

    <!-- x+y = 2: (0,2,0) cx=44, cy=108 -->
    <g>
      <polygon points="44,108 62,117 44,126 26,117" fill="#e2e8f0" stroke="#475569" stroke-width="0.5"/>
      <polygon points="26,117 44,126 44,148 26,139" fill="#94a3b8" stroke="#475569" stroke-width="0.5"/>
      <polygon points="44,126 62,117 62,139 44,148" fill="#64748b" stroke="#475569" stroke-width="0.5"/>
    </g>

    <!-- x+y = 2: Center Column (1,1,0), (1,1,1), (1,1,2) -->
    <!-- (1,1,0) cx=80, cy=108 -->
    <g>
      <polygon points="80,108 98,117 80,126 62,117" fill="#cbd5e1" stroke="#475569" stroke-width="0.5"/>
      <polygon points="62,117 80,126 80,148 62,139" fill="#94a3b8" stroke="#475569" stroke-width="0.5"/>
      <polygon points="80,126 98,117 98,139 80,148" fill="#64748b" stroke="#475569" stroke-width="0.5"/>
    </g>
    <!-- (1,1,1) cx=80, cy=86 -->
    <g>
      <polygon points="80,86 98,95 80,104 62,95" fill="#cbd5e1" stroke="#475569" stroke-width="0.5"/>
      <polygon points="62,95 80,104 80,126 62,117" fill="#94a3b8" stroke="#475569" stroke-width="0.5"/>
      <polygon points="80,104 98,95 98,117 80,126" fill="#64748b" stroke="#475569" stroke-width="0.5"/>
    </g>
    <!-- (1,1,2) cx=80, cy=64 -->
    <g>
      <polygon points="80,64 98,73 80,82 62,73" fill="#3b82f6" stroke="#1d4ed8" stroke-width="0.75"/>
      <polygon points="62,73 80,82 80,104 62,95" fill="#1d4ed8" stroke="#1d4ed8" stroke-width="0.75"/>
      <polygon points="80,82 98,73 98,95 80,104" fill="#1e3a8a" stroke="#1d4ed8" stroke-width="0.75"/>
    </g>

    <!-- x+y = 3: (2,1,0) cx=98, cy=117 -->
    <g>
      <polygon points="98,117 116,126 98,135 80,126" fill="#e2e8f0" stroke="#475569" stroke-width="0.5"/>
      <polygon points="80,126 98,135 98,157 80,148" fill="#94a3b8" stroke="#475569" stroke-width="0.5"/>
      <polygon points="98,135 116,126 116,148 98,157" fill="#64748b" stroke="#475569" stroke-width="0.5"/>
    </g>

    <!-- x+y = 3: (1,2,0) cx=62, cy=117 -->
    <g>
      <polygon points="62,117 80,126 62,135 44,126" fill="#e2e8f0" stroke="#475569" stroke-width="0.5"/>
      <polygon points="44,126 62,135 62,157 44,148" fill="#94a3b8" stroke="#475569" stroke-width="0.5"/>
      <polygon points="62,135 80,126 80,148 62,157" fill="#64748b" stroke="#475569" stroke-width="0.5"/>
    </g>

    <!-- x+y = 4: (2,2,0) cx=80, cy=126 -->
    <g>
      <polygon points="80,126 98,135 80,144 62,135" fill="#e2e8f0" stroke="#475569" stroke-width="0.5"/>
      <polygon points="62,135 80,144 80,166 62,157" fill="#94a3b8" stroke="#475569" stroke-width="0.5"/>
      <polygon points="80,144 98,135 98,157 80,166" fill="#64748b" stroke="#475569" stroke-width="0.5"/>
    </g>
  </g>

  <!-- Right Side: 2D Side View -->
  <g transform="translate(165, 0)">
    <rect x="5" y="10" width="140" height="140" rx="5" fill="none" stroke="#475569" stroke-width="2"/>
    <text x="75" y="25" font-family="sans-serif" font-size="10" font-weight="bold" fill="#ef4444" text-anchor="middle">ภาพมองจากด้านข้าง (Side View)</text>
    
    <!-- Ground line -->
    <line x1="20" y1="130" x2="130" y2="130" stroke="#94a3b8" stroke-width="2"/>
    
    <!-- Column 1 (height 1) -->
    <rect x="35" y="108" width="22" height="22" fill="#cbd5e1" stroke="#475569" stroke-width="1.5"/>
    <text x="46" y="121" font-family="sans-serif" font-size="8" fill="#475569" text-anchor="middle">1</text>

    <!-- Column 2 (height 3) -->
    <rect x="64" y="108" width="22" height="22" fill="#cbd5e1" stroke="#475569" stroke-width="1.5"/>
    <rect x="64" y="86" width="22" height="22" fill="#cbd5e1" stroke="#475569" stroke-width="1.5"/>
    <rect x="64" y="64" width="22" height="22" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="75" y="121" font-family="sans-serif" font-size="8" fill="#475569" text-anchor="middle">1</text>
    <text x="75" y="99" font-family="sans-serif" font-size="8" fill="#475569" text-anchor="middle">2</text>
    <text x="75" y="77" font-family="sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">3</text>

    <!-- Column 3 (height 1) -->
    <rect x="93" y="108" width="22" height="22" fill="#cbd5e1" stroke="#475569" stroke-width="1.5"/>
    <text x="104" y="121" font-family="sans-serif" font-size="8" fill="#475569" text-anchor="middle">1</text>
    
    <text x="75" y="145" font-family="sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">ความสูงสะสม: 1 - 3 - 1</text>
  </g>
</svg>
