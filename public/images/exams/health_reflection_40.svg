<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="100%" height="120">
  <rect x="0" y="0" width="300" height="120" fill="#0f172a" rx="8"/>
  
  <!-- Left Side: Original Word -->
  <rect x="20" y="20" width="100" height="80" rx="5" fill="none" stroke="#475569" stroke-width="2"/>
  <text x="70" y="66" font-family="sans-serif" font-size="22" font-weight="bold" fill="#3b82f6" text-anchor="middle" letter-spacing="2">HEALTH</text>
  <text x="70" y="90" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">ภาพต้นแบบ</text>

  <!-- Mirror Line -->
  <line x1="150" y1="15" x2="150" y2="105" stroke="#e2e8f0" stroke-width="3" stroke-dasharray="6,4"/>
  <text x="150" y="115" font-family="sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">กระจกเงา (Mirror)</text>

  <!-- Right Side: Reflected Word Box -->
  <rect x="180" y="20" width="100" height="80" rx="5" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4"/>
  <text x="230" y="68" font-family="sans-serif" font-size="32" font-weight="bold" fill="#ef4444" text-anchor="middle">?</text>
  <text x="230" y="90" font-family="sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">ภาพในกระจก</text>
</svg>
