<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="100%" height="200">
  <defs>
    <linearGradient id="cylinderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="40%" stop-color="#475569"/>
      <stop offset="80%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  
  <rect x="0" y="0" width="240" height="200" fill="#0f172a" rx="8"/>
  
  <!-- Vertical Rotation Axis (dashed line) -->
  <line x1="120" y1="20" x2="120" y2="180" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="120" y="15" font-family="sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">แกนดิ่งในการหมุน (Vertical Axis)</text>
  
  <!-- Cylinder Body -->
  <path d="M 80 60 A 40 15 0 0 0 160 60 L 160 140 A 40 15 0 0 1 80 140 Z" fill="url(#cylinderGrad)" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Top Face -->
  <ellipse cx="120" cy="60" rx="40" ry="15" fill="#334155" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Bottom Face (visible part) -->
  <path d="M 80 140 A 40 15 0 0 0 160 140" fill="none" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Red Point: center of top face -->
  <circle cx="120" cy="60" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5"/>
  <text x="175" y="63" font-family="sans-serif" font-size="10" fill="#ef4444" font-weight="bold">จุดสีแดง (Red)</text>
  <line x1="128" y1="60" x2="165" y2="60" stroke="#ef4444" stroke-width="1" stroke-dasharray="2"/>
  
  <!-- Blue Point: bottom left edge -->
  <circle cx="90" cy="144" r="6" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5"/>
  <text x="45" y="148" font-family="sans-serif" font-size="10" fill="#3b82f6" font-weight="bold">จุดสีน้ำเงิน (Blue)</text>
  <line x1="82" y1="144" x2="55" y2="148" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2"/>
  
  <!-- Rotation Arrow -->
  <path d="M 100 35 Q 120 45 140 35" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <path d="M 136 33 L 140 35 L 137 40" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="120" y="30" font-family="sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">หมุนตามเข็ม 90°</text>
</svg>
